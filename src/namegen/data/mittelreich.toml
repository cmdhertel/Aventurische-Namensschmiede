[compose.first.female]
prefix = ["Al", "Ros", "Kuni"]
infix  = ["rik", "lin"]
suffix = ["a", "e", "inde"]

[compose.first.neutral]
prefix = []
infix  = []
suffix = []

[compose.last]
infix_probability = 0.0

[compose.last.neutral]
prefix = ["Sturm", "Fels"]
infix  = []
suffix = ["wind", "burg", "heim"]
