[meta]
region   = "Mittelreich"
language = "de"
notes    = "Das Herz Aventuriens. Namen folgen bosparanisch-germanischen Mustern."

[simple.first]
male    = ["Aldric", "Gerwin"]
female  = ["Alrike", "Rowena"]
neutral = []

[simple.last]
male    = ["von Gareth", "der Tapfere"]
female  = ["von Gareth", "die Mutige"]
