name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pytest

      - name: Run pytest
        run: pytest

      - name: Normalize repository name
        id: repo
        run: echo "lower=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CLI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.lower }}/namegen-cli:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.lower }}/namegen-cli:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.lower }}/namegen-web:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.lower }}/namegen-web:latest
      - name: Build CLI Docker image
        run: docker build -f Dockerfile -t dsa-namegen-cli:ci .

      - name: Build Web Docker image
        run: docker build -f web/Dockerfile -t dsa-namegen-web:ci .
