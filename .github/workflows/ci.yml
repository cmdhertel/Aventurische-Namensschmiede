name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Run ruff linting
        run: uv run ruff check .

      - name: Run ruff formatting check
        run: uv run ruff format --check .

  test:
    # Only run full tests for PRs to main or pushes to main
    if: github.event_name == 'push' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest

  build:
    # Only build and push for PRs to main or pushes to main
    if: github.event_name == 'push' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize repository name
        id: repo
        run: echo "lower=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CLI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.lower }}/namegen-cli:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.lower }}/namegen-cli:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.lower }}/namegen-web:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.lower }}/namegen-web:latest

      - name: Build CLI Docker image
        if: github.event_name != 'push'
        run: docker build -f Dockerfile -t dsa-namegen-cli:ci .

      - name: Build Web Docker image
        if: github.event_name != 'push'
        run: docker build -f web/Dockerfile -t dsa-namegen-web:ci .

  deploy_web:
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Validate deploy configuration
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT || '22' }}
          DEPLOY_TARGET_DIR: ${{ vars.DEPLOY_TARGET_DIR || secrets.DEPLOY_TARGET_DIR || '/opt/namenschmiede' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          set -e
          missing=0

          require_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required GitHub Actions secret: $name"
              missing=1
            fi
          }

          require_secret "DEPLOY_HOST" "$DEPLOY_HOST"
          require_secret "DEPLOY_USER" "$DEPLOY_USER"
          require_secret "DEPLOY_SSH_KEY" "$DEPLOY_SSH_KEY"
          require_secret "GHCR_USERNAME" "$GHCR_USERNAME"
          require_secret "GHCR_TOKEN" "$GHCR_TOKEN"
          require_secret "APP_DOMAIN" "$APP_DOMAIN"
          require_secret "GRAFANA_ADMIN_PASSWORD" "$GRAFANA_ADMIN_PASSWORD"

          if [ "$missing" -ne 0 ]; then
            echo "::error::Deploy aborted because required secrets are missing. Configure the repository secrets and rerun the workflow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize repository name
        id: repo
        run: echo "lower=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Ensure target directory exists
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          port: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT || 22 }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p "${{ vars.DEPLOY_TARGET_DIR || secrets.DEPLOY_TARGET_DIR || '/opt/namenschmiede' }}/infra"
            mkdir -p "${{ vars.DEPLOY_TARGET_DIR || secrets.DEPLOY_TARGET_DIR || '/opt/namenschmiede' }}/ops"
            mkdir -p "${{ vars.DEPLOY_TARGET_DIR || secrets.DEPLOY_TARGET_DIR || '/opt/namenschmiede' }}/certbot/conf"
            mkdir -p "${{ vars.DEPLOY_TARGET_DIR || secrets.DEPLOY_TARGET_DIR || '/opt/namenschmiede' }}/certbot/www"

      - name: Create deployment bundle
        run: tar -czf deploy-bundle.tgz infra/docker-compose.prod.yml ops/observability ops/nginx

      - name: Copy deployment bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          port: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT || 22 }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy-bundle.tgz"
          target: "${{ vars.DEPLOY_TARGET_DIR || secrets.DEPLOY_TARGET_DIR || '/opt/namenschmiede' }}"

      - name: Deploy web and observability stack
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
          port: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT || 22 }}
          username: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            TARGET_DIR="${{ vars.DEPLOY_TARGET_DIR || secrets.DEPLOY_TARGET_DIR || '/opt/namenschmiede' }}"
            mkdir -p "$TARGET_DIR/infra" "$TARGET_DIR/ops"
            tar -xzf "$TARGET_DIR/deploy-bundle.tgz" -C "$TARGET_DIR"
            rm -f "$TARGET_DIR/deploy-bundle.tgz"
            cat > "$TARGET_DIR/infra/.env" <<EOF
            IMAGE_NAME=ghcr.io/${{ steps.repo.outputs.lower }}/namegen-web
            IMAGE_TAG=${{ github.sha }}
            APP_DOMAIN=${{ secrets.APP_DOMAIN }}
            APP_BASE_URL=https://${{ secrets.APP_DOMAIN }}
            APP_ENABLE_API_DOCS=0
            GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER || 'admin' }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            EOF
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            cd "$TARGET_DIR"
            docker compose --env-file infra/.env -f infra/docker-compose.prod.yml pull
            docker compose --env-file infra/.env -f infra/docker-compose.prod.yml up -d
            docker compose --env-file infra/.env -f infra/docker-compose.prod.yml restart nginx
            docker image prune -f
