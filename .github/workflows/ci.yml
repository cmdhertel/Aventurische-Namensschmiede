name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pytest

      - name: Run pytest
        run: pytest

      - name: Build CLI Docker image
        run: docker build -f Dockerfile -t dsa-namegen-cli:ci .

      - name: Build Web Docker image
        run: docker build -f web/Dockerfile -t dsa-namegen-web:ci .
