{% for r in results %}
{% set gv = r.resolved_gender.value %}
<div class="name-entry group"
     data-full-name="{{ r.full_name }}"
     data-gender="{{ gv }}"
     data-region="{{ r.region }}"
     data-culture="{{ r.culture or '' }}"
     data-species="{{ r.species or '' }}"
     data-region-abbr="{{ r.region_abbreviation or '' }}"
     data-mode="{{ r.mode.value }}">

  <div class="flex items-center gap-3 w-full">
  <!-- Name + Region -->
  <div class="flex-1 min-w-0">
    <p class="font-display font-semibold text-sm sm:text-base"
       style="color: var(--color-text);">
      {{ r.full_name }}
    </p>
    <p class="text-xs mt-0.5"
       style="font-family: 'Inter', sans-serif; color: var(--color-text-faint);">
      {{ r.species or 'Unbekannt' }}
      {% if r.culture and r.culture != r.region %} · {{ r.culture }}{% endif %}
      {% if r.region %} · {{ r.region }}{% endif %}
    </p>
  </div>

  <!-- Geschlecht-Badge -->
  <span class="shrink-0
    {% if gv == 'male' %}badge-male
    {% elif gv == 'female' %}badge-female
    {% else %}badge-neutral{% endif %}">
    {{ gender_de[gv] }}
  </span>

  <div class="entry-actions">
    <button type="button"
            onclick="toggleFavourite(this)"
            aria-label="Favorit umschalten"
            class="favourite-toggle entry-action-button"
            style="color: var(--color-text-faint);">
      ☆
    </button>

    <!-- Löschen -->
    <button type="button" onclick="removeName(this)" aria-label="Entfernen"
            class="entry-action-button entry-action-danger text-base">
      &times;
    </button>
  </div>
  </div><!-- /flex row -->

</div><!-- /name-entry -->
{% endfor %}
