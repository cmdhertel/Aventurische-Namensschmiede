{% for r in results %}
{% set gv = r.resolved_gender.value %}
<div class="name-entry group"
     data-full-name="{{ r.full_name }}"
     data-gender="{{ gv }}"
     data-region="{{ r.region }}"
     data-region-abbr="{{ region_abbr }}"
     data-mode="{{ r.mode.value }}">

  <div class="flex items-center gap-3 w-full">
  <!-- Name + Region -->
  <div class="flex-1 min-w-0">
    <p class="font-display font-semibold text-sm sm:text-base"
       style="color: var(--color-text);">
      {{ r.full_name }}
    </p>
    <p class="text-xs mt-0.5"
       style="font-family: 'Inter', sans-serif; color: var(--color-text-faint);">
      {{ r.region }}
    </p>
  </div>

  <!-- Geschlecht-Badge -->
  <span class="shrink-0
    {% if gv == 'male' %}badge-male
    {% elif gv == 'female' %}badge-female
    {% else %}badge-neutral{% endif %}">
    {{ gender_de[gv] }}
  </span>

  <!-- Löschen -->
  <button type="button" onclick="removeName(this)" aria-label="Entfernen"
          class="shrink-0 w-6 h-6 rounded flex items-center justify-center text-base leading-none
                 transition-all duration-150 opacity-0 group-hover:opacity-100 focus:opacity-100"
          style="color: var(--color-text-faint);"
          onmouseenter="this.style.color='#dc2626'; this.style.backgroundColor='rgba(220,38,38,0.08)'"
          onmouseleave="this.style.color='var(--color-text-faint)'; this.style.backgroundColor='transparent'">
    &times;
  </button>
  </div><!-- /flex row -->

</div><!-- /name-entry -->
{% endfor %}
