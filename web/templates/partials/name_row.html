{% for r in results %}
{% set gv = r.resolved_gender.value %}
<div class="name-entry group flex items-center gap-3 px-4 py-3
            bg-stone-800/50 rounded-lg border border-stone-700/40
            hover:border-stone-600/60 hover:bg-stone-800/70
            transition-all duration-150"
     data-full-name="{{ r.full_name }}"
     data-gender="{{ gv }}"
     data-region="{{ r.region }}"
     data-mode="{{ r.mode.value }}">

  <!-- Name + Region -->
  <div class="flex-1 min-w-0">
    <p class="font-display text-amber-100 font-semibold truncate text-sm sm:text-base">
      {{ r.full_name }}
    </p>
    <p class="text-xs text-stone-600 mt-0.5">{{ r.region }}</p>
  </div>

  <!-- Geschlecht-Badge -->
  <span class="shrink-0
    {% if gv == 'male' %}badge-male
    {% elif gv == 'female' %}badge-female
    {% else %}badge-neutral{% endif %}">
    {{ gender_de[gv] }}
  </span>

  <!-- Löschen-Button -->
  <button
    type="button"
    onclick="removeName(this)"
    aria-label="Entfernen"
    class="shrink-0 text-stone-700 hover:text-red-500 transition-colors
           opacity-0 group-hover:opacity-100 focus:opacity-100 text-xl leading-none">
    &times;
  </button>
</div>
{% endfor %}
